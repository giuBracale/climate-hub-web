<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Climate Hub | Explore Climate and Economic Data</title>
    <meta
      name="description"
      content="Explore historical climate and economic indicators across countries using trusted public datasets."
    />

    <!-- Open Graph — update og:url and og:image to absolute URLs before deploying -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Climate Hub | Explore Climate and Economic Data" />
    <meta
      property="og:description"
      content="Explore historical climate and economic indicators across countries using trusted public datasets."
    />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Climate Hub | Explore Climate and Economic Data" />
    <meta
      name="twitter:description"
      content="Explore historical climate and economic indicators across countries using trusted public datasets."
    />
    <meta name="twitter:image" content="/og-image.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
