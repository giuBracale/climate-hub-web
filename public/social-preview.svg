<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Left brand accent -->
  <rect x="0" y="0" width="4" height="630" fill="#0ea5e9"/>

  <!-- Subtle chart decoration -->
  <polyline
    points="560,590 680,490 770,530 870,420 970,375 1080,300 1200,255"
    fill="none"
    stroke="#0ea5e9"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.18"
  />

  <!-- Brand label -->
  <text
    x="80" y="240"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="16"
    font-weight="600"
    fill="#38bdf8"
    letter-spacing="4"
  >CLIMATE HUB</text>

  <!-- Headline -->
  <text
    x="80" y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="56"
    font-weight="700"
    fill="white"
    letter-spacing="-1"
  >Explore climate and</text>
  <text
    x="80" y="375"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="56"
    font-weight="700"
    fill="white"
    letter-spacing="-1"
  >economic data.</text>

  <!-- Description -->
  <text
    x="80" y="435"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="22"
    fill="#94a3b8"
  >Historical records across countries, from trusted public datasets.</text>

  <!-- Source attribution -->
  <text
    x="80" y="575"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="15"
    fill="#334155"
  >World Bank · Our World in Data · EEA · Global Carbon Project</text>
</svg>
